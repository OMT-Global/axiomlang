name: PR Fast CI

on:
  pull_request:
    types: [opened, edited, synchronize, reopened, ready_for_review]

concurrency:
  group: pr-fast-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

env:
  NODE_VERSION: '20'

defaults:
  run:
    shell: bash

jobs:
  changes:
    name: Detect Relevant Changes
    runs-on: ubuntu-latest
    outputs:
      app: ${{ steps.filter.outputs.app }}
      ci: ${{ steps.filter.outputs.ci }}
    steps:
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v3 pinned 2026-04-19
        id: filter
        with:
          filters: |
            app:
              - 'project.bootstrap.yaml'
              - 'AGENTS.md'
              - 'CLAUDE.md'
              - '.github/PULL_REQUEST_TEMPLATE.md'
              - '.devcontainer/**'
              - '.githooks/**'
              - '.github/workflows/**'
              - 'scripts/**'
              - 'docs/bootstrap/**'
              - 'README.md'
              - 'docs/**'
              - 'stage1/**'
              - 'Makefile'
            ci:
              - 'project.bootstrap.yaml'
              - 'AGENTS.md'
              - 'CLAUDE.md'
              - '.github/PULL_REQUEST_TEMPLATE.md'
              - '.devcontainer/**'
              - '.githooks/**'
              - '.github/workflows/**'
              - 'scripts/**'
              - 'docs/bootstrap/**'
              - '.env.example'
              - 'CODEOWNERS'
              - 'Makefile'
              - '.github/dependabot.yml'

  fast-checks:
    name: Fast Checks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: changes
    if: >-
      github.event.pull_request.draft == false &&
      (needs.changes.outputs.app == 'true' || needs.changes.outputs.ci == 'true')
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4 pinned 2026-04-19
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable pinned 2026-04-19
      - uses: actions/setup-go@44694675825211faa026b3c33043df3e48a5fa00 # v6 pinned 2026-04-19

      - name: Run fast checks
        run: bash scripts/ci/run-fast-checks.sh
      - name: Run Go/Rust/Axiom comparison report
        run: python3 scripts/ci/check-stage1-benchmarks.py --json-out stage1/target/stage1-comparison-report.json

      - name: Upload advisory comparison report
        if: always()
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808 # v4 pinned 2026-04-19
        with:
          name: stage1-comparison-report
          path: stage1/target/stage1-comparison-report.json
          if-no-files-found: ignore

  validate-secrets:
    name: Validate Secrets
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event.pull_request.draft == false
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4 pinned 2026-04-19
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - name: Scan repository for secret patterns
        run: bash scripts/check-detect-secrets.sh --all-files

  validate-pr-description:
    name: Validate PR Description
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event.pull_request.draft == false && github.event.pull_request.user.login != 'dependabot[bot]'
    env:
      PR_BODY: ${{ github.event.pull_request.body }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4 pinned 2026-04-19
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - name: Validate PR description requirements
        run: bash scripts/ci/validate-pr-description.sh

  ci-gate:
    name: CI Gate
    runs-on: ubuntu-latest
    if: always()
    needs:
      - changes
      - fast-checks
      - validate-pr-description
      - validate-secrets
    steps:
      - name: Check required PR jobs
        env:
          RESULTS: >-
            changes=${{ needs.changes.result }}
            fast-checks=${{ needs.fast-checks.result }}
            validate-pr-description=${{ needs.validate-pr-description.result }}
            validate-secrets=${{ needs.validate-secrets.result }}
        run: |
          failed=0
          for entry in $RESULTS; do
            job="${entry%%=*}"
            status="${entry##*=}"
            if [[ "$status" == "success" || "$status" == "skipped" ]]; then
              echo "OK   $job => $status"
            else
              echo "FAIL $job => $status"
              failed=1
            fi
          done
          exit "$failed"
