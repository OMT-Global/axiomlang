name: PR Fast CI

on:
  pull_request:
    types: [opened, edited, synchronize, reopened, ready_for_review]

concurrency:
  group: pr-fast-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.12'

defaults:
  run:
    shell: bash

jobs:
  changes:
    name: Detect Relevant Changes
    runs-on: ['self-hosted', 'synology', 'shell-only', 'public']
    outputs:
      app: ${{ steps.filter.outputs.app }}
      ci: ${{ steps.filter.outputs.ci }}
    steps:
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            app:
              - 'project.bootstrap.yaml'
              - 'AGENTS.md'
              - 'CONTRIBUTING.md'
              - '.github/PULL_REQUEST_TEMPLATE.md'
              - '.githooks/**'
              - '.github/workflows/**'
              - 'scripts/**'
              - 'stage1/**'
              - 'docs/bootstrap/**'
              - 'README.md'
              - 'docs/**'
            ci:
              - 'project.bootstrap.yaml'
              - 'AGENTS.md'
              - 'CONTRIBUTING.md'
              - '.github/PULL_REQUEST_TEMPLATE.md'
              - '.githooks/**'
              - '.github/workflows/**'
              - 'scripts/**'
              - 'stage1/**'
              - 'docs/bootstrap/**'
              - '.env.example'
              - 'CODEOWNERS'

  fast-checks:
    name: Fast Checks
    runs-on: ['self-hosted', 'synology', 'shell-only', 'public']
    timeout-minutes: 15
    needs: changes
    if: >-
      github.event.pull_request.draft == false &&
      (needs.changes.outputs.app == 'true' || needs.changes.outputs.ci == 'true')
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable pinned 2026-04-19

      - name: Detect Rust linker availability
        run: |
          if command -v cc >/dev/null 2>&1; then
            echo "AXIOM_FAST_CI_PROOF_WORKLOADS=1" >> "$GITHUB_ENV"
            exit 0
          fi

          echo "::warning::cc is unavailable on this self-hosted runner; skipping proof workload execution"
          echo "AXIOM_FAST_CI_PROOF_WORKLOADS=0" >> "$GITHUB_ENV"

      - name: Run fast checks
        run: bash scripts/ci/run-fast-checks.sh

  validate-pr-description:
    name: Validate PR Description
    runs-on: ['self-hosted', 'synology', 'shell-only', 'public']
    timeout-minutes: 5
    if: github.event.pull_request.draft == false
    env:
      PR_BODY: ${{ github.event.pull_request.body }}
      PR_AUTHOR: ${{ github.event.pull_request.user.login }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - name: Require generated PR template content
        run: bash scripts/ci/validate-pr-description.sh


  validate-secrets:
    name: Validate Secrets
    runs-on: ['self-hosted', 'synology', 'shell-only', 'public']
    timeout-minutes: 10
    if: github.event.pull_request.draft == false
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - name: Scan repository for secret patterns
        run: bash scripts/check-detect-secrets.sh --all-files

  ci-gate:
    name: CI Gate
    runs-on: ['self-hosted', 'synology', 'shell-only', 'public']
    if: always()
    needs:
      - changes
      - fast-checks
      - validate-pr-description
      - validate-secrets
    steps:
      - name: Check required PR jobs
        env:
          RESULTS: >-
            changes=${{ needs.changes.result }}
            fast-checks=${{ needs.fast-checks.result }}
            validate-pr-description=${{ needs.validate-pr-description.result }}
            validate-secrets=${{ needs.validate-secrets.result }}
        run: |
          failed=0
          for entry in $RESULTS; do
            job="${entry%%=*}"
            status="${entry##*=}"
            if [[ "$status" == "success" || "$status" == "skipped" ]]; then
              echo "OK   $job => $status"
            else
              echo "FAIL $job => $status"
              failed=1
            fi
          done
          exit "$failed"
