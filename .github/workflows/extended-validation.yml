name: Extended Validation

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

concurrency:
  group: extended-validation-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name != 'workflow_dispatch' }}

permissions:
  contents: read

env:
  NODE_VERSION: '20'

defaults:
  run:
    shell: bash

jobs:
  changes:
    name: Detect Extended Validation Scope
    runs-on: ['self-hosted', 'synology', 'shell-only', 'public']
    outputs:
      app: ${{ steps.preset.outputs.app || steps.filter.outputs.app || 'false' }}
      ci: ${{ steps.preset.outputs.ci || steps.filter.outputs.ci || 'false' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4 pinned 2026-04-19
        if: github.event_name == 'push'
        with:
          fetch-depth: 0

      - name: Run full suite for nightly or manual invocations
        id: preset
        if: github.event_name != 'push'
        run: |
          cat >>"$GITHUB_OUTPUT" <<'EOF'
          app=true
          ci=true
          EOF

      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v3 pinned 2026-04-19
        id: filter
        if: github.event_name == 'push'
        with:
          filters: |
            app:
              - 'project.bootstrap.yaml'
              - 'AGENTS.md'
              - 'CLAUDE.md'
              - '.devcontainer/**'
              - '.githooks/**'
              - '.github/workflows/**'
              - 'scripts/**'
              - 'docs/bootstrap/**'
              - 'README.md'
              - 'docs/**'
              - 'stage1/**'
              - 'Makefile'
            ci:
              - 'project.bootstrap.yaml'
              - 'AGENTS.md'
              - 'CLAUDE.md'
              - '.devcontainer/**'
              - '.githooks/**'
              - '.github/workflows/**'
              - 'scripts/**'
              - 'docs/bootstrap/**'
              - '.env.example'
              - 'CODEOWNERS'
              - 'Makefile'
  fast-checks:
    name: Fast Checks
    runs-on: ['self-hosted', 'synology', 'shell-only', 'public']
    timeout-minutes: 15
    needs: changes
    if: needs.changes.outputs.app == 'true' || needs.changes.outputs.ci == 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4 pinned 2026-04-19
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable pinned 2026-04-19

      - name: Run fast checks
        run: bash scripts/ci/run-fast-checks.sh

  validate-secrets:
    name: Validate Secrets
    runs-on: ['self-hosted', 'synology', 'shell-only', 'public']
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4 pinned 2026-04-19
      - name: Scan repository for secret patterns
        run: bash scripts/check-detect-secrets.sh --all-files

  stage1-extended-checks:
    name: Stage1 Extended Checks
    runs-on: ['self-hosted', 'synology', 'shell-only', 'public']
    timeout-minutes: 20
    needs: changes
    if: needs.changes.outputs.app == 'true' || needs.changes.outputs.ci == 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4 pinned 2026-04-19
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable pinned 2026-04-19

      - name: Run extended stage1 checks
        run: bash scripts/ci/run-extended-stage1-checks.sh

  performance-benchmarks:
    name: Performance Benchmarks
    runs-on: ['self-hosted', 'synology', 'shell-only', 'public']
    timeout-minutes: 20
    needs: changes
    if: needs.changes.outputs.app == 'true' || needs.changes.outputs.ci == 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4 pinned 2026-04-19
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable pinned 2026-04-19
      - name: Set up Go
        uses: actions/setup-go@44694675825211faa026b3c33043df3e48a5fa00 # v6 pinned 2026-04-19
        with:
          go-version: '1.24.2'
      - name: Run stage1 benchmark gate
        run: make stage1-bench-gate

  extended-validation-gate:
    name: Extended Validation Gate
    runs-on: ['self-hosted', 'synology', 'shell-only', 'public']
    if: always()
    needs:
      - changes
      - fast-checks
      - validate-secrets
      - stage1-extended-checks
      - performance-benchmarks
    steps:
      - name: Check extended validation jobs
        env:
          RESULTS: >-
            changes=${{ needs.changes.result }}
            fast-checks=${{ needs.fast-checks.result }}
            validate-secrets=${{ needs.validate-secrets.result }}
            stage1-extended-checks=${{ needs.stage1-extended-checks.result }}
            performance-benchmarks=${{ needs.performance-benchmarks.result }}
        run: |
          failed=0
          for entry in $RESULTS; do
            job="${entry%%=*}"
            status="${entry##*=}"
            if [[ "$status" == "success" || "$status" == "skipped" ]]; then
              echo "OK   $job => $status"
            else
              echo "FAIL $job => $status"
              failed=1
            fi
          done
          exit "$failed"
