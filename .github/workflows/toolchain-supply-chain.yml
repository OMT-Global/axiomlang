name: Toolchain Supply Chain

on:
  pull_request:
    paths:
      - '.github/workflows/toolchain-supply-chain.yml'
      - 'scripts/ci/**'
      - 'stage1/**'
      - 'Makefile'
      - 'CONTRIBUTING.md'
  push:
    branches: [main]
    paths:
      - '.github/workflows/toolchain-supply-chain.yml'
      - 'scripts/ci/**'
      - 'stage1/**'
      - 'Makefile'
      - 'CONTRIBUTING.md'
  schedule:
    - cron: '17 6 * * *'
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  supply-chain:
    name: Lockfile Integrity, Vetting, and SBOM
    runs-on: ['self-hosted', 'linux', 'shell-only', 'public']
    timeout-minutes: 20
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4 pinned 2026-04-19
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable pinned 2026-04-19
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v4 pinned 2026-04-27
        if: ${{ hashFiles('package-lock.json') != '' }}
        with:
          node-version: 20

      - name: Ensure cargo-vet
        run: |
          required_version="$(
            awk '
              /^\[cargo-vet\]$/ { in_cargo_vet = 1; next }
              /^\[/ { in_cargo_vet = 0 }
              in_cargo_vet && $1 == "version" {
                gsub(/"/, "", $3)
                print $3
                exit
              }
            ' stage1/supply-chain/config.toml
          )"
          if [[ -z "$required_version" ]]; then
            echo "unable to read cargo-vet version from stage1/supply-chain/config.toml" >&2
            exit 1
          fi

          installed_version=""
          if command -v cargo-vet >/dev/null 2>&1; then
            installed_version="$(cargo-vet --version || true)"
          fi

          if [[ "$installed_version" != "cargo-vet ${required_version}" &&
                "$installed_version" != "cargo-vet ${required_version}."* ]]; then
            cargo install cargo-vet --version "$required_version" --locked --force
          fi
      - name: Run supply-chain checks
        env:
          SOURCE_DATE_EPOCH: '1704067200'
          SBOM_OUTPUT_DIR: stage1/target/sbom
        run: bash scripts/ci/run-toolchain-supply-chain.sh
      - name: Upload stage1 SBOM
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4 pinned 2026-04-19
        with:
          name: stage1-sbom
          path: stage1/target/sbom/stage1.spdx.json
          if-no-files-found: error
