version: 1
project:
  name: axiom
  description: An experimental, end-to-end inspectable programming language with a Rust-based
    native bootstrap compiler.
  visibility: public
  owner: OMT-Global
  defaultBranch: main
repo:
  managedPaths:
    - project.bootstrap.yaml
    - AGENTS.md
    - CLAUDE.md
    - CODEOWNERS
    - .githooks/**
    - .devcontainer/**
    - .github/PULL_REQUEST_TEMPLATE.md
    - .github/workflows/pr-fast-ci.yml
    - .github/workflows/extended-validation.yml
    - .github/workflows/claude.yml
    - .github/ISSUE_TEMPLATE/implementation.yml
    - .github/ISSUE_TEMPLATE/flow_blocker.yml
    - scripts/check-detect-secrets.sh
    - scripts/ci/**
    - scripts/codex-cloud/**
    - scripts/claude-cloud/**
    - scripts/claude/**
    - docs/bootstrap/**
archetype:
  kind: generic-empty
  packageManager: npm
  moduleName: axiom
github:
  createRepo: false
  flowGovernance: true
  reviewers:
    - jmcte
    - pheidon
    - scrappedcode
  codeowners:
    - pattern: "*"
      owners:
        - "@jmcte"
        - "@pheidon"
    - pattern: "/.github/workflows/"
      owners:
        - "@jmcte"
        - "@pheidon"
        - "@scrappedcode"
    - pattern: "/.githooks/"
      owners:
        - "@jmcte"
        - "@pheidon"
        - "@scrappedcode"
    - pattern: "/scripts/"
      owners:
        - "@jmcte"
        - "@pheidon"
        - "@scrappedcode"
    - pattern: "/project.bootstrap.yaml"
      owners:
        - "@jmcte"
        - "@pheidon"
        - "@scrappedcode"
    - pattern: "/stage1/crates/axiomc/src/"
      owners:
        - "@jmcte"
        - "@pheidon"
        - "@scrappedcode"
  autoMerge: true
  deleteBranchOnMerge: true
  requiredApprovals: 1
  requiredStatusChecks:
    - CI Gate
  dismissStaleReviews: true
  requireCodeOwnerReviews: true
  requireLastPushApproval: false
  enforceLinearHistory: true
  allowMergeCommit: true
  allowSquashMerge: true
  allowRebaseMerge: true
  repoFeatures:
    hasIssues: true
    hasProjects: false
    hasWiki: false
    hasDiscussions: false
ci:
  runnerPolicy: hybrid-safe
  nodeVersion: "20"
  fastChecks:
    - stage1-test
    - stage1-conformance
    - stage1-smoke
  extendedChecks: []
  nightlyCron: 0 7 * * *
agents:
  manageCodexHome: true
  manageClaudeHome: true
  codexProfile: default
  claudeProfile: default
  enableClaudeWebEnvironment: true
  enableClaudeDevcontainer: true
  enableClaudeGitHubAction: true
  sharedSkills: []
environments:
  dev:
    reviewers: []
    requireApproval: false
    preventSelfReview: false
    branches: []
  stage:
    reviewers:
      - jmcte
    requireApproval: true
    preventSelfReview: true
    branches: []
  prod:
    reviewers:
      - jmcte
    requireApproval: true
    preventSelfReview: true
    branches:
      - main
