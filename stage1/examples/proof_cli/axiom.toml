[package]
name = "proof-cli"
version = "0.1.0"

[workspace]
members = ["deps/core", "deps/ui"]

[dependencies]
core = { path = "deps/core" }
ui = { path = "deps/ui" }

[build]
entry = "src/main.ax"
out_dir = "dist"

[capabilities]
fs = false
net = false
process = false
env = ["AXIOM_STAGE1_CLI_MODE"]
clock = true
crypto = false
ffi = false
