[package]
name = "stdlib-env-unrestricted"
version = "0.1.0"

[build]
entry = "src/main.ax"
out_dir = "dist"

[capabilities]
fs = false
net = false
process = false
env = true
unsafe_unrestricted = true
unsafe_opt_in = true
unsafe_rationale = "example intentionally exercises unrestricted environment migration behavior"
clock = false
crypto = false
