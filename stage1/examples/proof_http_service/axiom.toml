[package]
name = "proof-http-service"
version = "0.1.0"

[build]
entry = "src/main.ax"
out_dir = "dist"

[capabilities]
fs = false
net = true
process = false
env = ["REQUEST_METHOD", "REQUEST_PATH"]
clock = true
crypto = false

[[tests]]
name = "http-service-health"
entry = "src/server_test.ax"
stdout = "true\n"
http = { bind = "127.0.0.1:18080", path = "/health", expected_body = "{\"path\":\"/health\",\"ok\":true}" }
